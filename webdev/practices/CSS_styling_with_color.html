<!DOCTYPE html>

<html>
    <head>
        <title>CSS Styling with Color</title>
        <meta charset="UTF-8">
        <style>
            #complementary{
                background-color: blue;
                border: 3px solid orange;
                width: 100px;
                height: 50px;
                color: white;
            }
            #analogous{
                background-color: green;
                border: 3px solid greenyellow;
                width: 100px;
                height: 50px;
                color: yellow;
            }
            #triadic{
                background-color: red;
                border: 3px solid yellow;
                width: 100px;
                height: 50px;
                color: blue;
            }
        </style>
    </head>
    <body>
        <div id="complementary">
            <p>Complementary</p>
        </div>
        <div id="analogous">
            <p>Analogous</p>
        </div>
        <div id="triadic">
            <p>Triadic</p>
        </div>
    </body>
</html>
